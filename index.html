<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#EDE8DC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#EDE8DC" media="(prefers-color-scheme: dark)" />
    <script>
      (function(){try{var t=localStorage.getItem('physio_theme');var theme=(t&&JSON.parse(t)==='medical')?'medical':'soft';var bg=theme==='medical'?'#f1f5f9':'#EDE8DC';document.documentElement.setAttribute('data-theme',theme);document.documentElement.style.background=bg;var meta=document.querySelector('meta[name="theme-color"]');if(meta)meta.setAttribute('content',bg);}catch(e){document.documentElement.setAttribute('data-theme','soft');document.documentElement.style.background='#EDE8DC';}}());
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Physio" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Physio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
